name: health_bridge_example
description: Demonstrates how to use the health_bridge plugin.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.6.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  permission_handler: ^11.3.1
  health_bridge:
